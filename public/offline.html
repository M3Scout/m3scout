<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem Conexão | M3 Scout</title>
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="/favicon2.png" sizes="any" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    
    p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(220, 38, 38, 0.3);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .retry-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      margin-top: 32px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .status.online {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }
    
    .status.checking {
      background: rgba(250, 204, 21, 0.1);
      color: #facc15;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .spinner {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logoapp-512.png" alt="M3 Scout" class="logo" />
    
    <svg class="icon pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="4" y1="4" x2="20" y2="20" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
    </svg>
    
    <h1>Sem Conexão</h1>
    <p>
      Você está offline. Verifique sua conexão com a internet e tente novamente.
    </p>
    
    <button class="retry-btn" id="retryBtn" onclick="handleRetry()">
      <svg id="retryIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 3v5h-5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="retryText">Tentar Novamente</span>
    </button>
    
    <div class="status" id="status">
      Aguardando conexão...
    </div>
  </div>
  
  <script>
    // Emergency SW cleanup: this offline page can get stuck in a loop if an old
    // Service Worker keeps serving it as a fallback even when the user is online.
    // We do NOT register any SW here; we only remove old ones and clear caches.
    (async function cleanupOldServiceWorkers() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
      } catch (e) {
        // ignore
      }

      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) {
        // ignore
      }
    })();

    let isChecking = false;
    let retryCount = 0;
    const MAX_RETRIES = 3;
    
    // Real connectivity check - fetches a small resource
    async function checkRealConnectivity() {
      try {
        // Try to fetch a small resource with cache-busting
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        const response = await fetch('/favicon2.png?_=' + Date.now(), {
          method: 'HEAD',
          cache: 'no-store',
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        return response.ok;
      } catch (e) {
        return false;
      }
    }
    
    // Update status display
    function updateStatusUI(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = 'status ' + (type || '');
    }
    
    // Set button state
    function setButtonState(loading) {
      const btn = document.getElementById('retryBtn');
      const icon = document.getElementById('retryIcon');
      const text = document.getElementById('retryText');
      
      btn.disabled = loading;
      
      if (loading) {
        icon.classList.add('spinner');
        text.textContent = 'Verificando...';
      } else {
        icon.classList.remove('spinner');
        text.textContent = 'Tentar Novamente';
      }
    }
    
    // Handle retry button click
    async function handleRetry() {
      if (isChecking) return;
      isChecking = true;
      setButtonState(true);
      updateStatusUI('Verificando conexão...', 'checking');
      
      const isOnline = await checkRealConnectivity();
      
      if (isOnline) {
        updateStatusUI('Conexão restaurada! Recarregando...', 'online');
        // Hard reload to bypass any cached content
        setTimeout(() => {
          window.location.href = window.location.origin + window.location.pathname + '?_reload=' + Date.now();
        }, 500);
      } else {
        retryCount++;
        if (retryCount >= MAX_RETRIES) {
          updateStatusUI('Ainda sem conexão. Verifique seu Wi-Fi ou dados móveis.', '');
          retryCount = 0;
        } else {
          updateStatusUI('Sem conexão. Tentativa ' + retryCount + ' de ' + MAX_RETRIES, '');
        }
        setButtonState(false);
        isChecking = false;
      }
    }
    
    // Automatic connection monitoring
    async function monitorConnection() {
      // Only auto-reload if navigator says we're online AND real check passes
      if (navigator.onLine) {
        const isReallyOnline = await checkRealConnectivity();
        if (isReallyOnline) {
          updateStatusUI('Conexão restaurada! Recarregando...', 'online');
          setTimeout(() => {
            window.location.href = window.location.origin + window.location.pathname + '?_reload=' + Date.now();
          }, 500);
          return;
        }
      }
      updateStatusUI('Aguardando conexão...', '');
    }
    
    // Listen for online/offline events
    window.addEventListener('online', () => {
      // Don't trust navigator.onLine alone - verify with real fetch
      setTimeout(monitorConnection, 1000);
    });
    
    window.addEventListener('offline', () => {
      updateStatusUI('Você está offline', '');
    });
    
    // Initial check after page loads
    setTimeout(monitorConnection, 500);
  </script>
</body>
</html>
